services:

  company-db:
    image: postgres:16.1
    container_name: postgres-company-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=company
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
    healthcheck:
      test: pg_isready -q -d $$POSTGRES_DB -U $$POSTGRES_USER
      timeout: 5s
      interval: 5s
      retries: 10

    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - microservices-network

  db-init:
    image: postgres:16.1
    container_name: db-init
    depends_on:
      company-db:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        set -e
        echo "Waiting for PostgreSQL to be ready..."
        # Подключаемся к стандартной БД postgres
        until psql postgresql://postgres:root@company-db:5432/postgres -c '\q'; do
          sleep 1
        done
        echo "Creating databases..."
        psql postgresql://postgres:root@company-db:5432/postgres -v ON_ERROR_STOP=1 <<-EOSQL
        create database core_company_service;
        create database core_user_service;
        EOSQL
        echo "All databases created successfully!"
    networks:
      - microservices-network

  discovery-server:
    build:
      context: ./infra/discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./infra/config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"  # Фиксированный порт для Config Server
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ./core/user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://company-db:5432/core_user_service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      company-db:
        condition: service_healthy
    networks:
      - microservices-network

  company-service:
    build:
      context: ./core/company-service
      dockerfile: Dockerfile
    container_name: company-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://company-db:5432/core_company_service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      company-db:
        condition: service_healthy
    networks:
      - microservices-network

  api-gateway:
    build:
      context: ./infra/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - microservices-network


networks:
  microservices-network:
    driver: bridge